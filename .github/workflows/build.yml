name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CMAKE_COMMON_ARGS: >-
    -DBUILD_LIBRETRO_CORE=ON
    -DUSE_LIBRETRO_AUDIO=ON
    -DENABLE_USER_BUILD=ON
    -DENABLE_VULKAN=OFF
    -DENABLE_LUAJIT=OFF
    -DENABLE_DISCORD_RPC=OFF
    -DENABLE_QT_GUI=OFF
    -DENABLE_OPENGL=ON
    -DENABLE_HTTP_SERVER=OFF
    -DENABLE_TESTS=OFF

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 ${{ env.CMAKE_COMMON_ARGS }}

      - name: Build
        run: cmake --build build --config Release --target panda3ds_libretro

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trident_libretro-windows-x64
          path: build/Release/trident_libretro.dll

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ env.CMAKE_COMMON_ARGS }}

      - name: Build
        run: cmake --build build --config Release --target panda3ds_libretro -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trident_libretro-linux-x64
          path: build/trident_libretro.so

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: >-
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES=arm64
          -DENABLE_METAL=OFF
          ${{ env.CMAKE_COMMON_ARGS }}

      - name: Build
        run: cmake --build build --config Release --target panda3ds_libretro -j$(sysctl -n hw.logicalcpu)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trident_libretro-macos-arm64
          path: build/trident_libretro.dylib

  build-macos-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: >-
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES=x86_64
          -DENABLE_METAL=OFF
          ${{ env.CMAKE_COMMON_ARGS }}

      - name: Build
        run: cmake --build build --config Release --target panda3ds_libretro -j$(sysctl -n hw.logicalcpu)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trident_libretro-macos-x64
          path: build/trident_libretro.dylib

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Configure CMake
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: >-
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake
          -DANDROID_ABI=arm64-v8a
          -DANDROID_PLATFORM=android-26
          -DENABLE_METAL=OFF
          ${{ env.CMAKE_COMMON_ARGS }}

      - name: Build
        run: cmake --build build --config Release --target panda3ds_libretro -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trident_libretro-android-arm64
          path: build/trident_libretro.so

  build-ios:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: >-
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_SYSTEM_NAME=iOS
          -DCMAKE_OSX_ARCHITECTURES=arm64
          -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0
          -DIOS_SIMULATOR_BUILD=OFF
          -DCMAKE_C_FLAGS="-march=armv8-a+crc+crypto"
          -DCMAKE_CXX_FLAGS="-march=armv8-a+crc+crypto"
          -DENABLE_METAL=ON
          -DBUILD_LIBRETRO_CORE=ON
          -DUSE_LIBRETRO_AUDIO=ON
          -DENABLE_USER_BUILD=ON
          -DENABLE_VULKAN=OFF
          -DENABLE_LUAJIT=OFF
          -DENABLE_DISCORD_RPC=OFF
          -DENABLE_QT_GUI=OFF
          -DENABLE_OPENGL=OFF
          -DENABLE_HTTP_SERVER=OFF
          -DENABLE_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release --target panda3ds_libretro -j$(sysctl -n hw.logicalcpu)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trident_libretro-ios-arm64
          path: build/trident_libretro.dylib

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-macos-arm64, build-macos-x64, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/trident_libretro-windows-x64/trident_libretro.dll release/trident_libretro_windows_x64.dll
          cp artifacts/trident_libretro-linux-x64/trident_libretro.so release/trident_libretro_linux_x64.so
          cp artifacts/trident_libretro-macos-arm64/trident_libretro.dylib release/trident_libretro_macos_arm64.dylib
          cp artifacts/trident_libretro-macos-x64/trident_libretro.dylib release/trident_libretro_macos_x64.dylib
          cp artifacts/trident_libretro-android-arm64/trident_libretro.so release/trident_libretro_android_arm64.so
          cp artifacts/trident_libretro-ios-arm64/trident_libretro.dylib release/trident_libretro_ios_arm64.dylib

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
