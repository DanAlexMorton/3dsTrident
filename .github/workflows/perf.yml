name: Performance Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CMAKE_COMMON_ARGS: >-
    -DBUILD_LIBRETRO_CORE=ON
    -DUSE_LIBRETRO_AUDIO=ON
    -DENABLE_USER_BUILD=ON
    -DENABLE_VULKAN=OFF
    -DENABLE_LUAJIT=OFF
    -DENABLE_DISCORD_RPC=OFF
    -DENABLE_QT_GUI=OFF
    -DENABLE_OPENGL=ON
    -DENABLE_HTTP_SERVER=OFF
    -DENABLE_TESTS=OFF
    -DENABLE_METAL=OFF

jobs:
  perf-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgl-dev libx11-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev xvfb

      - name: Install RetroArch
        run: |
          sudo add-apt-repository -y ppa:libretro/stable
          sudo apt-get update
          sudo apt-get install -y retroarch
        continue-on-error: true

      - name: Install devkitPro and build test ROMs
        run: |
          sudo apt-get install -y apt-transport-https
          sudo mkdir -p /usr/local/share/keyrings/
          wget -q https://apt.devkitpro.org/devkitpro-pub.gpg -O /tmp/devkitpro-pub.gpg
          sudo cp /tmp/devkitpro-pub.gpg /usr/local/share/keyrings/devkitpro-pub.gpg
          echo "deb [signed-by=/usr/local/share/keyrings/devkitpro-pub.gpg] https://apt.devkitpro.org stable main" | sudo tee /etc/apt/sources.list.d/devkitpro.list
          sudo apt-get update
          sudo apt-get install -y devkitpro-pacman
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm 3ds-dev
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=$DEVKITPRO/devkitARM
          export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
          cd vendor/Panda3DS/tests/SimplerTri && make
          cp SimplerTri.3dsx $GITHUB_WORKSPACE/tests/perf/roms/simpler_tri.3dsx
        continue-on-error: true

      - name: Build Trident core
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ env.CMAKE_COMMON_ARGS }}
          cmake --build build --config Release --target panda3ds_libretro -j$(nproc)

      - name: Find core binary
        run: find build -name "trident_libretro*" -type f

      - name: Run benchmarks
        run: |
          mkdir -p tests/perf/results
          if [ -f tests/perf/roms/simpler_tri.3dsx ] && command -v retroarch &>/dev/null; then
            xvfb-run python3 tests/perf/perf_bench.py \
              --core build/trident_libretro.so \
              --retroarch retroarch \
              --platform linux-x64 \
              --output tests/perf/results/linux-x64.json
          else
            echo '{"platform":"linux-x64","benchmarks":[],"note":"skipped: test ROM or RetroArch not available"}' > tests/perf/results/linux-x64.json
            echo "Skipped: test ROM or RetroArch not available"
          fi
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-results-linux
          path: tests/perf/results/

  perf-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install RetroArch
        shell: pwsh
        run: |
          $url = "https://buildbot.libretro.com/stable/1.19.1/windows/x86_64/RetroArch.7z"
          Invoke-WebRequest -Uri $url -OutFile retroarch.7z
          7z x retroarch.7z -oretroarch_portable
          echo "RETROARCH_PATH=$PWD\retroarch_portable\RetroArch-Win64\retroarch.exe" >> $env:GITHUB_ENV
        continue-on-error: true

      - name: Build Trident core
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 ${{ env.CMAKE_COMMON_ARGS }}
          cmake --build build --config Release --target panda3ds_libretro

      - name: Find core binary
        shell: pwsh
        run: Get-ChildItem -Recurse build -Filter "trident_libretro*" | Select-Object FullName

      - name: Run benchmarks
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tests/perf/results | Out-Null
          if (($env:RETROARCH_PATH) -and (Test-Path $env:RETROARCH_PATH)) {
            python tests/perf/perf_bench.py `
              --core build/Release/trident_libretro.dll `
              --retroarch $env:RETROARCH_PATH `
              --platform windows-x64 `
              --output tests/perf/results/windows-x64.json
          } else {
            '{"platform":"windows-x64","benchmarks":[],"note":"skipped: RetroArch not available"}' | Out-File -Encoding utf8 tests/perf/results/windows-x64.json
            Write-Output "Skipped: RetroArch not available"
          }
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-results-windows
          path: tests/perf/results/

  report:
    needs: [perf-linux, perf-windows]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: perf-artifacts
        continue-on-error: true

      - name: Generate summary
        run: |
          echo "## Performance Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          found_results=false
          for f in perf-artifacts/perf-results-*/*.json; do
            if [ -f "$f" ]; then
              found_results=true
              platform=$(python3 -c "import json; d=json.load(open('$f')); print(d.get('platform','unknown'))")
              note=$(python3 -c "import json; d=json.load(open('$f')); print(d.get('note',''))")
              benchmarks=$(python3 -c "import json; d=json.load(open('$f')); print(len(d.get('benchmarks',[])))")

              echo "### $platform" >> $GITHUB_STEP_SUMMARY
              if [ "$benchmarks" = "0" ]; then
                echo "No benchmark data. ${note}" >> $GITHUB_STEP_SUMMARY
              else
                echo '```' >> $GITHUB_STEP_SUMMARY
                python3 -c "
          import json
          d=json.load(open('$f'))
          for b in d.get('benchmarks',[]):
              print(f'  {b[\"rom\"]}: avg_fps={b.get(\"avg_fps\",\"N/A\")}, p99={b.get(\"p99_frame_time_ms\",\"N/A\")}ms')
          " >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
              fi
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done

          if [ "$found_results" = false ]; then
            echo "No performance results were produced in this run." >> $GITHUB_STEP_SUMMARY
          fi
