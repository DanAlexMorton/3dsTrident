name: Cross-Platform Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CMAKE_COMMON_ARGS: >-
    -DBUILD_LIBRETRO_CORE=ON
    -DUSE_LIBRETRO_AUDIO=ON
    -DENABLE_USER_BUILD=ON
    -DENABLE_VULKAN=OFF
    -DENABLE_LUAJIT=OFF
    -DENABLE_DISCORD_RPC=OFF
    -DENABLE_QT_GUI=OFF
    -DENABLE_HTTP_SERVER=OFF
    -DENABLE_TESTS=OFF

jobs:
  # ──────────────────────────────────────────────
  # Linux
  # ──────────────────────────────────────────────
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgl-dev libx11-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev xvfb mesa-utils

      - name: Build core
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_OPENGL=ON -DENABLE_METAL=OFF \
            ${{ env.CMAKE_COMMON_ARGS }}
          cmake --build build --config Release --target panda3ds_libretro -j$(nproc)

      - name: Install test dependencies
        run: pip install -r tests/functional/requirements.txt

      - name: Run functional tests
        run: |
          mkdir -p test-results
          TRIDENT_CORE_PATH=build/trident_libretro.so \
            pytest tests/functional/ -v --tb=short --junitxml=test-results/functional-linux.xml
        continue-on-error: true

      - name: Install RetroArch for perf tests
        run: |
          sudo add-apt-repository -y ppa:libretro/stable
          sudo apt-get update
          sudo apt-get install -y retroarch
        continue-on-error: true

      - name: Install devkitPro and build test ROMs
        run: |
          sudo apt-get install -y apt-transport-https
          sudo mkdir -p /usr/local/share/keyrings/
          wget -q https://apt.devkitpro.org/devkitpro-pub.gpg -O /tmp/devkitpro-pub.gpg
          sudo cp /tmp/devkitpro-pub.gpg /usr/local/share/keyrings/devkitpro-pub.gpg
          echo "deb [signed-by=/usr/local/share/keyrings/devkitpro-pub.gpg] https://apt.devkitpro.org stable main" | sudo tee /etc/apt/sources.list.d/devkitpro.list
          sudo apt-get update
          sudo apt-get install -y devkitpro-pacman
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm 3ds-dev
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=$DEVKITPRO/devkitARM
          export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
          cd vendor/Panda3DS/tests/SimplerTri && make
          cp SimplerTri.3dsx $GITHUB_WORKSPACE/tests/perf/roms/simpler_tri.3dsx
        continue-on-error: true

      - name: Run perf benchmarks
        run: |
          xvfb-run python3 tests/perf/perf_bench.py \
            --core build/trident_libretro.so \
            --retroarch retroarch \
            --platform linux-x64 \
            --output test-results/perf-linux-x64.json
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-linux
          path: test-results/

  # ──────────────────────────────────────────────
  # Windows
  # ──────────────────────────────────────────────
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build core
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DENABLE_OPENGL=ON -DENABLE_METAL=OFF `
            ${{ env.CMAKE_COMMON_ARGS }}
          cmake --build build --config Release --target panda3ds_libretro

      - name: Install test dependencies
        run: pip install -r tests/functional/requirements.txt

      - name: Run functional tests
        shell: pwsh
        run: |
          $env:TRIDENT_CORE_PATH = "build\Release\trident_libretro.dll"
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          pytest tests/functional/ -v --tb=short --junitxml=test-results/functional-windows.xml
        continue-on-error: true

      - name: Install RetroArch for perf tests
        shell: pwsh
        run: |
          $url = "https://buildbot.libretro.com/stable/1.19.1/windows/x86_64/RetroArch.7z"
          Invoke-WebRequest -Uri $url -OutFile retroarch.7z
          7z x retroarch.7z -oretroarch_portable
          echo "RETROARCH_PATH=$PWD\retroarch_portable\RetroArch-Win64\retroarch.exe" >> $env:GITHUB_ENV

      - name: Run perf benchmarks
        shell: pwsh
        run: |
          python tests/perf/perf_bench.py `
            --core build/Release/trident_libretro.dll `
            --retroarch $env:RETROARCH_PATH `
            --platform windows-x64 `
            --output test-results/perf-windows-x64.json
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-windows
          path: test-results/

  # ──────────────────────────────────────────────
  # macOS ARM64
  # ──────────────────────────────────────────────
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build core
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DENABLE_OPENGL=ON -DENABLE_METAL=OFF \
            ${{ env.CMAKE_COMMON_ARGS }}
          cmake --build build --config Release --target panda3ds_libretro -j$(sysctl -n hw.logicalcpu)

      - name: Install test dependencies
        run: pip install -r tests/functional/requirements.txt

      - name: Run functional tests
        run: |
          mkdir -p test-results
          TRIDENT_CORE_PATH=build/trident_libretro.dylib \
            pytest tests/functional/ -v --tb=short --junitxml=test-results/functional-macos.xml
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-macos
          path: test-results/

  # ──────────────────────────────────────────────
  # Android: Cross-compile build verification
  # ──────────────────────────────────────────────
  test-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Build core for Android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DENABLE_OPENGL=ON -DENABLE_METAL=OFF \
            ${{ env.CMAKE_COMMON_ARGS }}
          cmake --build build --config Release --target panda3ds_libretro -j$(nproc)

      - name: Verify Android core built
        run: |
          echo "=== Android core ==="
          find build -name "trident_libretro*" -type f
          file build/trident_libretro.so || true

  # ──────────────────────────────────────────────
  # iOS: Build verification (no runtime tests)
  # ──────────────────────────────────────────────
  test-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build core for iOS Simulator
        run: |
          cmake -B build-sim -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DENABLE_METAL=ON -DENABLE_OPENGL=OFF \
            -DIOS_SIMULATOR_BUILD=ON \
            -DCMAKE_C_FLAGS="-march=armv8-a+crc+crypto" \
            -DCMAKE_CXX_FLAGS="-march=armv8-a+crc+crypto" \
            ${{ env.CMAKE_COMMON_ARGS }}
          cmake --build build-sim --config Release --target panda3ds_libretro -j$(sysctl -n hw.logicalcpu)

      - name: Verify iOS Simulator core built
        run: |
          echo "=== iOS Simulator core ==="
          find build-sim -name "trident_libretro*" -type f

  # ──────────────────────────────────────────────
  # Summary: Aggregate all results
  # ──────────────────────────────────────────────
  test-summary:
    needs: [test-linux, test-windows, test-macos, test-android, test-ios]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results
        continue-on-error: true

      - name: Generate summary
        run: |
          pip3 install junitparser 2>/dev/null || true
          cat > /tmp/summarize.py << 'PYEOF'
          import glob, os, sys

          lines = []
          lines.append("## Cross-Platform Test Results\n")
          lines.append("| Platform | Functional | Performance | Status |")
          lines.append("|----------|-----------|-------------|--------|")

          for d in sorted(glob.glob("all-results/test-results-*/")):
              platform = os.path.basename(d.rstrip("/")).replace("test-results-", "")
              func = "N/A"
              perf = "N/A"

              xml_files = glob.glob(os.path.join(d, "functional-*.xml"))
              if xml_files:
                  try:
                      import xml.etree.ElementTree as ET
                      tree = ET.parse(xml_files[0])
                      root = tree.getroot()
                      ts = root.find(".//testsuite") if root.tag != "testsuite" else root
                      if ts is not None:
                          t = int(ts.get("tests", 0))
                          f = int(ts.get("failures", 0))
                          e = int(ts.get("errors", 0))
                          s = int(ts.get("skipped", 0))
                          p = t - f - e - s
                          func = f"{p}P/{f}F/{e}E/{s}S"
                  except Exception:
                      func = "parse error"

              import json
              perf_files = glob.glob(os.path.join(d, "perf-*.json"))
              if perf_files:
                  try:
                      data = json.load(open(perf_files[0]))
                      bs = data.get("benchmarks", [])
                      if bs:
                          perf = f"{bs[0].get('avg_fps', 'N/A')} FPS"
                  except Exception:
                      perf = "parse error"

              status = "pass" if ("0F/0E" in func or func == "N/A") else "fail"
              lines.append(f"| {platform} | {func} | {perf} | {status} |")

          if not glob.glob("all-results/test-results-*/"):
              lines.append("| (none) | N/A | N/A | - |")

          print("\n".join(lines))
          PYEOF
          python3 /tmp/summarize.py >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Generated at $(date -u +%Y-%m-%dT%H:%M:%SZ)*" >> $GITHUB_STEP_SUMMARY
